name: social_media_app
description: >-
  Compose once, preview everywhere, and publish to Instagram, Facebook,
  LinkedIn and X from a single screen. Built with Flutter using an MVVM
  architecture and Riverpod for state management.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management (MVVM ViewModels are Riverpod Notifiers)
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.2

  # Networking (real publishing + OAuth token exchange)
  http: ^1.2.2

  # OAuth2 redirect handling (deep links back into the app)
  url_launcher: ^6.3.1
  app_links: ^6.3.2
  crypto: ^3.0.6 # PKCE code challenge

  # Media
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Persistence
  shared_preferences: ^2.3.3 # drafts / scheduled / history
  flutter_secure_storage: ^9.2.2 # OAuth tokens

  # Scheduling
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.19.0
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
